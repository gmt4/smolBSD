name: Build smoler images

on:
  push:
    branches:
      - main
    paths:
      - smolerfiles/*
  workflow_dispatch:
    inputs:
      dockerfiles:
        description: "SMOLerfiles to build (space-separated paths, e.g. smolerfiles/Dockerfile.test smolerfiles/Dockerfile.caddy)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      QEMU_ACCEL: tcg
      DFILES: '(crush|clawd|bsdshell|nbakery)'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bmake \
            curl \
            gdisk \
            jq \
            libarchive-tools \
            qemu-system-x86 \
            qemu-system-aarch64 \
            rsync \
            socat \
            xz-utils

      - name: Fetch builder image
        run: |
          bmake fetchimg
          bmake ARCH=evbarm-aarch64 fetchimg

      - name: Build images with smoler
        run: |
          # fetch sailor for maximum minimization
          git clone --depth=1 https://github.com/NetBSDfr/sailor
          if [ "${{ github.event_name }}" = "push" ]; then
            dockerfiles="$(git diff --name-only HEAD~1|grep -E $DFILES|xargs)"
            echo ">>> changed dockerfiles: $dockerfiles"
          else
            dockerfiles="${{ inputs.dockerfiles }}"
          fi
          for df in $dockerfiles; do
            echo ">>> Building $df"
            # amd64
            ./smoler.sh build -y "$df"
            # arm64
            QEMU_ACCEL=tcg ARCH=evbarm-aarch64 ./smoler.sh build -y "$df"
          done

      - name: Push images to OCI registry
        run: |
          mkdir -p bin
          version=$(curl -s https://api.github.com/repos/oras-project/oras/releases/latest | jq -r '.tag_name')
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${version}/oras_${version#v}_linux_amd64.tar.gz" | tar xzf - -C bin oras
          echo "${GH_TOKEN}" | bin/oras login -u "${GITHUB_ACTOR}" --password-stdin ghcr.io

          for img in images/*.img; do
            imgname="${img#images/}"
            imgname="${imgname%.img}"
            case "$imgname" in build-*) continue;; esac
            echo ">>> Pushing $imgname"
            ./smoler.sh push "$imgname"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
